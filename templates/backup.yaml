AWSTemplateFormatVersion: '2010-09-09'
Description: Automated Backup and Disaster Recovery using AWS Backup

Resources:

  BackupVault:
    Type: AWS::Backup::BackupVault
    Properties:
      BackupVaultName: ProjectBackupVault

  BackupRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AWSBackupServiceRoleProject

      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:

          - Effect: Allow

            Principal:
              Service:
                - backup.amazonaws.com

            Action:
              - sts:AssumeRole

      ManagedPolicyArns:

        - arn:aws:iam::aws:policy/service-role/AWSBackupServiceRolePolicyForBackup

        - arn:aws:iam::aws:policy/service-role/AWSBackupServiceRolePolicyForRestores

  BackupPlan:
    Type: AWS::Backup::BackupPlan

    Properties:

      BackupPlan:

        BackupPlanName: DailyBackupPlan

        BackupPlanRule:

          - RuleName: DailyBackup

            TargetBackupVault: !Ref BackupVault

            ScheduleExpression: cron(0 5 * * ? *)

            Lifecycle:
              DeleteAfterDays: 7

  BackupSelection:
    Type: AWS::Backup::BackupSelection

    Properties:

      BackupPlanId: !Ref BackupPlan

      BackupSelection:

        SelectionName: EC2BackupSelection

        IamRoleArn: !GetAtt BackupRole.Arn

        Resources:
          - "*"

Outputs:

  BackupVault:
    Value: !Ref BackupVault

  BackupPlan:
    Value: !Ref BackupPlan
